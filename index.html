<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - James Wang</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Reset & CSS Variables */
        :root {
            --bg-dark: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1; /* Indigo */
            --accent-secondary: #a855f7; /* Purple */
            --accent-teal: #14b8a6; /* Teal */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated High-Tech Background Blobs */
        .bg-glow-1, .bg-glow-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            opacity: 0.45;
            pointer-events: none;
            animation: floatGlow 15s infinite alternate ease-in-out;
        }

        .bg-glow-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .bg-glow-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 70%);
            bottom: -15%;
            right: -10%;
            animation-delay: -5s;
        }

        /* Subtle grid pattern overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(80px, 50px) scale(1.15);
            }
        }

        /* Main Container Cards */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            padding: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.3);
        }

        /* Header Layout */
        .profile-container {
            margin-bottom: 30px;
            position: relative;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.1);
        }

        .greeting {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent-teal);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #ffffff 30%, #e0e7ff 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        /* Time & Date Display styling */
        .time-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-teal);
            border-radius: 50%;
            position: absolute;
            top: 15px;
            right: 15px;
            box-shadow: 0 0 10px var(--accent-teal);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
                box-shadow: 0 0 14px var(--accent-teal);
            }
            100% {
                transform: scale(0.9);
                opacity: 0.6;
            }
        }

        .clock-display {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .date-display {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .timezone-tag {
            display: inline-block;
            margin-top: 15px;
            padding: 4px 12px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            color: #c7d2fe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="grid-overlay"></div>

    <!-- Main Dynamic Card -->
    <div class="container">
        <div class="glass-card">
            
            <div class="profile-container">
                <div class="profile-avatar">JW</div>
                <div class="greeting">System Identity</div>
                <h1 class="name">James Wang</h1>
            </div>

            <div class="time-box">
                <div class="live-dot"></div>
                <div class="clock-display" id="live-clock">00:00:00</div>
                <div class="date-display" id="live-date">Loading date...</div>
                <div class="timezone-tag" id="timezone">UTC</div>
            </div>

        </div>
    </div>

    <!-- JavaScript to update Date and Time dynamically -->
    <script>
        function updateClock() {
            const clockEl = document.getElementById('live-clock');
            const dateEl = document.getElementById('live-date');
            const tzEl = document.getElementById('timezone');
            
            const now = new Date();
            
            // Format Time (HH:MM:SS)
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            
            // Pad digits with leading zero
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            clockEl.textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format Date (Day, Month DD, YYYY)
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateEl.textContent = now.toLocaleDateString('en-US', options);
            
            // Dynamic Timezone
            const timezoneString = Intl.DateTimeFormat().resolvedOptions().timeZone;
            tzEl.textContent = timezoneString ? timezoneString.replace('_', ' ') : 'Local Time';
        }

        // Initialize and tick every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
